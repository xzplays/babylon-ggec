<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon 园区场景服务</title>
  </head>
  <body>
    <canvas id="renderCanvas" aria-label="Babylon.js 园区三维场景"></canvas>
    <div id="hud">
      <h1>离线园区游览</h1>
      <p>1 单位 = 1 米；WASD/方向键移动，鼠标拖拽环视，Shift 加速，V 切换视角，靠近绿色入口按 E 进入建筑。</p>
      <p id="modeLabel">当前：第一视角</p>
      <p id="locationLabel">位置：室外园区</p>
    </div>
    <aside id="buildingPanel" aria-label="快捷建筑列表">
      <h2>快捷建筑</h2>
      <p>点击可传送到门前或直接进入内部。</p>
      <div id="buildingList"></div>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
