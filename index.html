<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Babylon 园区场景服务</title></head>
  <body>
    <canvas id="renderCanvas" aria-label="Babylon.js 园区三维场景"></canvas>
    <div id="hud">
      <div class="hudHeader"><h1>1:1 现实比例园区展示</h1><button id="hudToggle" type="button" aria-expanded="true">收起</button></div>
      <div class="hudBody">
        <p>1 单位 = 1 米；WASD/方向键移动，Space 跳跃，F1/F2/F4 切换第一/第三/俯瞰视角，E 进门，F 乘坐动画电梯。</p>
        <p id="modeLabel">当前：第一视角</p><p id="locationLabel">位置：室外园区</p><p id="scaleLabel">比例：1 Babylon单位 = 1米</p>
        <label id="speedControl">移动速度：<input id="speedSlider" type="range" min="1" max="20" step="0.25" value="1.25" /><span id="speedLabel">1.25 m/s</span></label><button id="resetButton" type="button">重置到主入口</button>
      </div>
    </div>
    <aside id="buildingPanel" aria-label="快捷建筑列表"><div class="panelHeader"><h2>快捷建筑</h2><button id="panelToggle" type="button" aria-expanded="true">收起</button></div><div class="panelBody"><p>点击可传送到门前或直接进入内部。</p><div id="buildingList"></div></div></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
